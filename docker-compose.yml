version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vintage-postgres
    environment:
      POSTGRES_USER: vintage
      POSTGRES_PASSWORD: vintage
      POSTGRES_DB: vintage_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vintage']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vintage-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: vintage-meilisearch
    environment:
      MEILI_MASTER_KEY: vintage_dev_key
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:7700/health']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
