# Secret-scan gate. Runs on every push + PR. Fails the build on any
# leaked credential that our .gitleaks.toml allowlist doesn't cover.
# Keep in sync with scripts/check-secrets.sh which runs the same
# binary locally from a pre-commit hook.

name: gitleaks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # gitleaks-action hits /repos/:owner/:repo/pulls/:num/commits to
  # enumerate the commits it should scan on PR events. Without
  # pull-requests: read the action 403s with "Resource not accessible
  # by integration". Read-only is enough — the action never writes.
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Scan the full history on PRs so a secret buried in an
          # earlier commit is still caught — gitleaks will otherwise
          # only see the PR diff.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
