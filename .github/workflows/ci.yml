name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vintage
          POSTGRES_PASSWORD: vintage
          POSTGRES_DB: vintage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo build --filter=@vintage/shared

      - name: Lint
        run: npx turbo lint

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Run API tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://vintage:vintage@localhost:5432/vintage_test
          JWT_SECRET: test-secret-do-not-use-in-production
          NODE_ENV: test
        run: npm test

      - name: Build API
        run: npx turbo build --filter=@vintage/api

      - name: Build Web
        run: npx turbo build --filter=@vintage/web

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
