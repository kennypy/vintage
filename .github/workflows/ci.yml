name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vintage
          POSTGRES_PASSWORD: vintage
          POSTGRES_DB: vintage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Every turbo command below carries `--force` to defeat the local
      # turbo cache. CLAUDE.md mandates byte-for-byte parity with
      # scripts/ci-parity.sh, which always runs with --force; without
      # it, CI can replay a stale PASS from a prior run and mask real
      # source failures. See the anti-pattern table in CLAUDE.md
      # ("Trusted turbo's cached result").

      # Step 1: Build shared packages
      - name: Build shared packages
        run: npx turbo build --filter=@vintage/shared --force

      # Step 2: Generate Prisma client
      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      # Step 3: Lint all packages
      - name: Lint
        run: npx turbo lint --force

      # Step 4: Type-check API
      - name: Type-check API
        run: npx tsc -p apps/api/tsconfig.json --noEmit

      # Step 5: Run all tests
      - name: Run tests
        env:
          DATABASE_URL: postgresql://vintage:vintage@localhost:5432/vintage_test
          JWT_SECRET: test-secret-do-not-use-in-production
          NODE_ENV: test
        run: npx turbo test --force

      # Step 6: Build API
      - name: Build API
        run: npx turbo build --filter=@vintage/api --force

      # Step 7: Build Web
      - name: Build Web
        run: npx turbo build --filter=@vintage/web --force

      # Step 8: Security audit — runs in the same job, after build, so the
      # local pre-push gate (scripts/ci-parity.sh / .mjs Step 9) and CI
      # check the same versions in the same order. Previously this was a
      # parallel `security-audit` job which made local devs and CI
      # disagree on what was checked when (CLAUDE.md anti-pattern: the
      # two runners must stay byte-for-byte equivalent in what they
      # check). Wave 3A cleared the tree (NestJS 10→11, multer v2,
      # nodemailer v8, bcrypt v6) so hard-blocking on HIGH is currently
      # achievable; if a new transitive CVE breaks this, check
      # DEPENDENCY_UPGRADE_PLAN.md before loosening the gate.
      - name: Security audit (high gate)
        run: npm audit --audit-level=high

  # Web E2E smoke tests (Playwright). Runs in parallel with `ci`.
  # Mirrors the optional E2E=1 step in scripts/ci-parity.sh — locally
  # contributors opt in (browser install is heavy); CI always runs it
  # because the browser binary is cached across runs.
  e2e-web:
    name: E2E (Web smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Shared has to be built before the dev server boots — apps/web
      # imports from @vintage/shared at runtime.
      - name: Build shared packages
        run: npx turbo build --filter=@vintage/shared --force

      # Cache the Chromium binary so subsequent CI runs don't re-download
      # ~150MB. Cache key tracks the @playwright/test version so a bump
      # invalidates automatically.
      - name: Resolve Playwright version
        id: playwright-version
        working-directory: apps/web
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright + Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      # When the cache hits we still need the system libs (apt packages)
      # the browser depends on — they're installed on the runner, not in
      # the cached folder.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/web
        run: npx playwright install-deps chromium

      - name: Run E2E smoke tests
        working-directory: apps/web
        env:
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
