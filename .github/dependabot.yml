version: 2

# Dependabot config — quiet-by-default.
#
# What this file does: tells Dependabot to only surface SECURITY
# advisories, not routine version bumps. With the defaults we
# previously had (weekly npm updates across the whole tree) the first
# run immediately opened ~10 PRs for every out-of-date major/minor,
# which was noise, not signal.
#
# What this file does NOT do: toggle "Dependabot security updates" —
# that's a separate switch in the repository settings (Security &
# analysis → Dependabot security updates). Enable it there so the
# bot opens PRs the moment a CVE is published against a dep we
# actually use. The `allow: - dependency-type: "production"` below
# ensures the version-update scanner only touches production deps, so
# the bot won't open weekly PRs for dev-dep housekeeping either.

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    # Only production deps, only security-relevant bumps. This, combined
    # with the monthly cadence, keeps the PR queue to a handful per
    # quarter instead of a flood.
    allow:
      - dependency-type: "production"
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - security
    ignore:
      # Pinned for compatibility — React 19 breaks the Next 14 pages
      # router (see CLAUDE.md §Pinned Versions).
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - ci
      - security
